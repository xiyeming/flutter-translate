name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build libgtk-3-dev libblkid-dev liblzma-dev \
            libssl-dev pkg-config libsqlite3-dev \
            libayatana-appindicator3-dev

      - name: Enable Linux desktop
        working-directory: flutter
        run: flutter config --enable-linux-desktop

      - name: Get Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' flutter/pubspec.yaml | sed 's/version: *//')
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Rust library
        working-directory: native
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: cargo build --release 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-log
          path: native/build.log

      - name: Generate FFI bindings
        working-directory: flutter
        run: |
          cargo install flutter_rust_bridge_codegen
          flutter_rust_bridge_codegen generate

      - name: Build Flutter Linux
        working-directory: flutter
        run: flutter build linux --release --verbose

      - name: Copy native library to bundle
        run: |
          mkdir -p flutter/build/linux/x64/release/bundle/lib
          cp native/target/release/libflutter_translate_native.so flutter/build/linux/x64/release/bundle/lib/
          # Bundle tray_manager system dependencies for Flatpak compatibility
          for lib in libayatana-appindicator3.so.1 libayatana-ido3-0.4.so.0 libayatana-indicator3.so.7 libdbusmenu-glib.so.4 libdbusmenu-gtk3.so.4; do
            if [ -f "/usr/lib/x86_64-linux-gnu/$lib" ]; then cp -L "/usr/lib/x86_64-linux-gnu/$lib" flutter/build/linux/x64/release/bundle/lib/; elif [ -f "/usr/lib/$lib" ]; then cp -L "/usr/lib/$lib" flutter/build/linux/x64/release/bundle/lib/; fi
          done
          echo "=== Bundle lib directory after system lib copy ==="
          ls -la flutter/build/linux/x64/release/bundle/lib/
          echo "=== File types in bundle lib ==="
          file flutter/build/linux/x64/release/bundle/lib/libayatana* || true
          file flutter/build/linux/x64/release/bundle/lib/libdbusmenu* || true

      - name: Package portable tarball
        run: |
          cd flutter/build/linux/x64/release
          tar czf waylex-linux-x64.tar.gz bundle/

      - name: Build AppImage
        run: |
          sudo apt-get install -y wget
          ./scripts/package_appimage.sh

      - name: Rename AppImage
        run: |
          mv build/Waylex-x86_64.AppImage build/Waylex-linux-x86_64.AppImage || true
          mv build/flutter-translate-x86_64.AppImage build/Waylex-linux-x86_64.AppImage || true

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-artifacts
          path: |
            build/*.AppImage
            !build/appimagetool-*.AppImage
            flutter/build/linux/x64/release/waylex-linux-x64.tar.gz

      - name: Upload bundle for Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-flatpak
          path: flutter/build/linux/x64/release/bundle/

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter (ARM64 via git)
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          $HOME/flutter/bin/flutter doctor -v

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build libgtk-3-dev libblkid-dev liblzma-dev \
            libssl-dev pkg-config libsqlite3-dev \
            libayatana-appindicator3-dev

      - name: Enable Linux desktop
        working-directory: flutter
        run: flutter config --enable-linux-desktop

      - name: Get Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' flutter/pubspec.yaml | sed 's/version: *//')
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Rust library
        working-directory: native
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: cargo build --release 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-log
          path: native/build.log

      - name: Generate FFI bindings
        working-directory: flutter
        run: |
          cargo install flutter_rust_bridge_codegen
          flutter_rust_bridge_codegen generate

      - name: Build Flutter Linux (aarch64)
        working-directory: flutter
        run: flutter build linux --release --verbose

      - name: Copy native library to bundle
        run: |
          mkdir -p flutter/build/linux/arm64/release/bundle/lib
          cp native/target/release/libflutter_translate_native.so flutter/build/linux/arm64/release/bundle/lib/
          for lib in libayatana-appindicator3.so.1 libayatana-ido3-0.4.so.0 libayatana-indicator3.so.7 libdbusmenu-glib.so.4 libdbusmenu-gtk3.so.4; do
            if [ -f "/usr/lib/aarch64-linux-gnu/$lib" ]; then cp -L "/usr/lib/aarch64-linux-gnu/$lib" flutter/build/linux/arm64/release/bundle/lib/; elif [ -f "/usr/lib/$lib" ]; then cp -L "/usr/lib/$lib" flutter/build/linux/arm64/release/bundle/lib/; fi
          done
          echo "=== Bundle lib directory after system lib copy ==="
          ls -la flutter/build/linux/arm64/release/bundle/lib/
          echo "=== File types in bundle lib ==="
          file flutter/build/linux/arm64/release/bundle/lib/libayatana* || true
          file flutter/build/linux/arm64/release/bundle/lib/libdbusmenu* || true

      - name: Package portable tarball
        run: |
          cd flutter/build/linux/arm64/release
          tar czf waylex-linux-aarch64.tar.gz bundle/

      - name: Build AppImage (aarch64)
        run: |
          sudo apt-get install -y wget
          ARCH=aarch64 ./scripts/package_appimage.sh

      - name: Rename AppImage
        run: |
          mv build/Waylex-aarch64.AppImage build/Waylex-linux-aarch64.AppImage || true

      - name: Upload Linux aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-artifacts
          path: |
            build/*.AppImage
            !build/appimagetool-*.AppImage
            flutter/build/linux/arm64/release/waylex-linux-aarch64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install Rust toolchain with targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}

      - name: Enable macOS desktop
        working-directory: flutter
        run: |
          flutter config --enable-macos-desktop
          flutter create --platforms=macos .

      - name: Get Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' flutter/pubspec.yaml | sed 's/version: *//')
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build x86_64
        working-directory: native
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: cargo build --release --target x86_64-apple-darwin 2>&1 | tee build-x86_64.log

      - name: Build aarch64
        working-directory: native
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: cargo build --release --target aarch64-apple-darwin 2>&1 | tee build-aarch64.log

      - name: Upload macOS build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-logs
          path: native/build-*.log

      - name: Create Universal Binary with lipo
        working-directory: native
        run: |
          mkdir -p target/universal/release
          X86_64_DYLIB="target/x86_64-apple-darwin/release/libflutter_translate_native.dylib"
          AARCH64_DYLIB="target/aarch64-apple-darwin/release/libflutter_translate_native.dylib"
          if [ ! -f "$X86_64_DYLIB" ]; then echo "Missing x86_64 dylib"; exit 1; fi
          if [ ! -f "$AARCH64_DYLIB" ]; then echo "Missing aarch64 dylib"; exit 1; fi
          echo "=== x86_64 dylib info ==="
          file "$X86_64_DYLIB"
          lipo -info "$X86_64_DYLIB" || true
          echo "=== aarch64 dylib info ==="
          file "$AARCH64_DYLIB"
          lipo -info "$AARCH64_DYLIB" || true
          echo "=== Creating universal binary ==="
          lipo -create "$X86_64_DYLIB" "$AARCH64_DYLIB" \
            -output target/universal/release/libflutter_translate_native.dylib
          lipo -info target/universal/release/libflutter_translate_native.dylib

      - name: Generate FFI bindings
        working-directory: flutter
        run: |
          cargo install flutter_rust_bridge_codegen
          flutter_rust_bridge_codegen generate

      - name: Build Flutter macOS
        working-directory: flutter
        run: flutter build macos --release --verbose

      - name: Copy dylib into app bundle
        run: |
          APP_BUNDLE=$(find flutter/build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          echo "App bundle: $APP_BUNDLE"
          if [ -z "$APP_BUNDLE" ]; then echo "No .app bundle found"; exit 1; fi
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          cp native/target/universal/release/libflutter_translate_native.dylib "$APP_BUNDLE/Contents/MacOS/"
          codesign --force --sign - "$APP_BUNDLE/Contents/MacOS/libflutter_translate_native.dylib"
          codesign --force --deep --sign - "$APP_BUNDLE"

      - name: Package macOS app
        run: |
          APP_BUNDLE=$(find flutter/build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          APP_NAME=$(basename "$APP_BUNDLE" .app)
          mkdir -p waylex-macos
          cp -R "$APP_BUNDLE" waylex-macos/
          cd waylex-macos
          zip -ry ../waylex-macos-universal.zip "$APP_NAME.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: waylex-macos-universal.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Add Windows desktop support
        working-directory: flutter
        run: flutter create --platforms=windows .

      - name: Enable Windows desktop
        working-directory: flutter
        run: flutter config --enable-windows-desktop

      - name: Get Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          $line = Select-String -Path "flutter/pubspec.yaml" -Pattern "^version:"
          $version = ($line.Line -replace "version:\s*", "").Trim()
          Write-Output "app_version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "APP_VERSION=$version" >> $env:GITHUB_ENV
          Write-Output "Version: $version"

      - name: Build Rust library
        working-directory: native
        env:
          RUST_BACKTRACE: 1
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: cargo build --release 2>&1 | Tee-Object -FilePath build.log

      - name: Upload Windows build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: native/build.log

      - name: Generate FFI bindings
        working-directory: flutter
        run: |
          cargo install flutter_rust_bridge_codegen
          flutter_rust_bridge_codegen generate

      - name: Build Flutter Windows
        working-directory: flutter
        run: flutter build windows --release --verbose

      - name: Copy native library to bundle
        run: |
          $dll = "native\target\release\flutter_translate_native.dll"
          Write-Output "DLL: $dll"

          # Locate the Release directory containing the built .exe
          $exe = Get-ChildItem -Path "flutter\build\windows" -Recurse -Filter "*.exe" `
            | Where-Object { $_.Name -ne "flutter_windows.dll" -and $_.DirectoryName -like "*Release*" } `
            | Select-Object -First 1
          if (-not $exe) {
            Write-Error "Built Windows executable not found"
            exit 1
          }

          $releaseDir = $exe.DirectoryName
          Write-Output "Copying DLL to: $releaseDir"
          Copy-Item -Path $dll -Destination "$releaseDir\" -Force

          # Record the path for packaging step
          "$releaseDir" | Out-File -FilePath "$env:RUNNER_TEMP\windows-release-dir.txt"

      - name: Package Windows zip
        run: |
          $releaseDir = Get-Content -Path "$env:RUNNER_TEMP\windows-release-dir.txt"
          $runnerDir = Split-Path -Parent $releaseDir
          Set-Location $runnerDir
          Compress-Archive -Path (Split-Path -Leaf $releaseDir) -DestinationPath "waylex-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: flutter/build/windows/**/waylex-windows-x64.zip

  build-flatpak:
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle-flatpak
          path: bundle/

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime
        run: |
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          cd flatpak
          # Repackage bundle as tarball for manifest source
          echo "=== Contents of downloaded bundle ==="
          find ../bundle -name "*.so*" | sort
          echo "=== Packaging tarball ==="
          tar czf waylex-linux-bundle.tar.gz -C ../bundle .
          echo "=== Tarball lib contents ==="
          tar tzf waylex-linux-bundle.tar.gz | grep "lib/" | sort
          echo "=== Building Flatpak ==="
          sudo flatpak-builder --force-clean --repo=../repo build-dir com.xym.ft.Waylex.yaml
          echo "=== Checking /app/lib in build-dir ==="
          find build-dir -path "*/app/lib/libayatana*" -o -path "*/app/lib/libdbusmenu*" | sort || true
          flatpak build-bundle ../repo ../Waylex.flatpak com.xym.ft.Waylex --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-artifact
          path: Waylex.flatpak

  release:
    needs: [build-linux, build-linux-aarch64, build-macos, build-windows, build-flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-artifacts
          path: artifacts/

      - name: Download Linux aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-aarch64-artifacts
          path: artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: flatpak-artifact
          path: artifacts/

      - name: List artifacts
        run: |
          echo "=== Raw artifact tree ==="
          find artifacts/ -type f

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-assets
          find artifacts/ -type f -exec cp {} release-assets/ \;
          echo "=== Flattened release assets ==="
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/*
