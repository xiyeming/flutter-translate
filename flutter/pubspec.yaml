name: flutter_translate
description: "AI 翻译桌面工具"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  flutter_rust_bridge: ^2.11.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  clipboard: ^0.1.3
  dynamic_color: ^1.7.0
  window_manager: ^0.4.3
  tray_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.6
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
