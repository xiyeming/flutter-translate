app-id: com.xym.ft.Waylex
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: Waylex

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --device=all
  - --socket=pulseaudio
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.kde.KGlobalAccel
  - --talk-name=org.kde.kglobalaccel
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-config
  - --filesystem=xdg-download
  - --filesystem=xdg-run/hypr

modules:
  - name: waylex
    buildsystem: simple
    build-commands:
      - install -Dm755 Waylex /app/bin/Waylex
      - cp -r data /app/bin/
      - cp -r lib /app/bin/
      - |
        # Copy all bundled shared libraries to /app/lib
        for f in lib/*.so*; do
          if [ -f "$f" ]; then
            install -Dm755 "$f" "/app/lib/$(basename $f)"
          fi
        done
      - |
        # Verify critical tray_manager dependencies are present
        for lib in libayatana-appindicator3.so.1 libayatana-ido3-0.4.so.0 libayatana-indicator3.so.7 libdbusmenu-glib.so.4 libdbusmenu-gtk3.so.4; do
          if [ ! -f "/app/lib/$lib" ]; then
            echo "ERROR: Missing required library /app/lib/$lib"
            ls -la /app/lib/ || true
            exit 1
          fi
        done
      - install -Dm644 com.xym.ft.Waylex.png /app/share/icons/hicolor/256x256/apps/com.xym.ft.Waylex.png
      - install -Dm644 com.xym.ft.Waylex.desktop /app/share/applications/com.xym.ft.Waylex.desktop
      - install -Dm644 com.xym.ft.Waylex.metainfo.xml /app/share/metainfo/com.xym.ft.Waylex.metainfo.xml
    sources:
      - type: archive
        path: waylex-linux-bundle.tar.gz
        dest: .
      - type: file
        path: com.xym.ft.Waylex.desktop
      - type: file
        path: com.xym.ft.Waylex.png
      - type: file
        path: com.xym.ft.Waylex.metainfo.xml
